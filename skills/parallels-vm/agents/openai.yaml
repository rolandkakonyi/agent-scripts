interface:
  display_name: "Parallels VM"
  short_description: "Control Parallels VMs with prlctl plus macOS guest wrappers for OpenClaw website installs, release smoke runs, update verification, and gateway probing."
  default_prompt: "Use $parallels-vm to automate or inspect Parallels Desktop VMs on Peter's Mac. Prefer prlctl first, use the bundled macOS guest wrappers for OpenClaw release smoke from openclaw.ai and gateway verification, fall back to detached manual gateway probes when Tahoe launchd bootstrap is broken, use guest-native control second, and Peekaboo only when host-side GUI automation is required."
